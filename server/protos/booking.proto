syntax = "proto3";

package booking;

service BookingService {
  rpc GetBookingStatsByDate(BookingStatsByDateRequest) returns (BookingStatsByDateResponse);
  rpc GetBookingGrowthStats(BookingGrowthStatsRequest) returns (BookingGrowthStatsResponse);
  rpc GetMonthlyBookingChart(MonthlyBookingChartRequest) returns (MonthlyBookingChartResponse);
  rpc GetBookingsForEvent(GetBookingsForEventRequest) returns (GetBookingsForEventResponse);
  rpc GetRefundStatus(GetRefundStatusRequest) returns (GetRefundStatusResponse);
}

message BookingStatsByDateRequest {
  string ticketId = 1;
  string selectedDate = 2;
}

message BookingStatsByDateResponse {
  int32 totalBookings = 1;
  double totalRevenue = 2;
  int32 totalTickets = 3;
  string bookingDate = 4;
}

message BookingGrowthStatsRequest {
  string ticketId = 1;
  string selectedDate = 2;
  string comparisonType = 3;
}

message BookingGrowthStatsResponse {
  int32 currentPeriodBookings = 1;
  int32 previousPeriodBookings = 2;
  string growthPercentage = 3;
  string comparisonType = 4;
}

message MonthlyBookingChartRequest {
  string ticketId = 1;
  int32 year = 2;
  int32 month = 3;
}

message ChartDataPoint {
  int32 day = 1;
  int32 bookingCount = 2;
  double revenue = 3;
}

message MonthlyBookingChartResponse {
  repeated ChartDataPoint chartData = 1;
}
message BookingUser {
  string bookingId = 1;
  string userId    = 2;
  string subtotal  = 3;
  string status    = 4;
}

message GetBookingsForEventRequest {
  string ticketId = 1;
}

message GetBookingsForEventResponse {
  repeated BookingUser bookings = 1;
  int32               count    = 2;
  string              error    = 3;
}

message GetRefundStatusRequest {
  string bookingId = 1;
}

message GetRefundStatusResponse {
  bool   success           = 1;
  string error             = 2;
  string bookingId         = 3;
  string userId            = 4;
  string ticketId          = 5;
  string eventName         = 6;
  string refundStatus      = 7;
  double refundAmount      = 8;
  string refundId          = 9;
  string processedAt       = 10;
  string refundInitiatedAt = 11;
}
