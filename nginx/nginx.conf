worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Logging
    access_log logs/access.log;
    error_log logs/error.log;

    # Default headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Upstream for WIE User Service (Load Balanced)
    upstream wie_user_service {
        least_conn;
        server localhost:5005 weight=1 max_fails=3 fail_timeout=30s;
        server localhost:5008 weight=1 max_fails=3 fail_timeout=30s backup;
        server localhost:5009 weight=1 max_fails=3 fail_timeout=30s backup;
        keepalive 32;
    }

    # Upstream for Auth Service (Single instance for now)
    upstream wie_auth_service {
        server localhost:5000 max_fails=3 fail_timeout=30s;
    }

    # Upstream for Ticket Service
    upstream wie_ticket_service {
        server localhost:5003 max_fails=3 fail_timeout=30s;
    }

    # Upstream for Chat Service
    upstream wie_chat_service {
        server localhost:5004 max_fails=3 fail_timeout=30s;
    }

    # Upstream for Notification Service
    upstream wie_notification_service {
        server localhost:5006 max_fails=3 fail_timeout=30s;
    }

    # Upstream for Transaction Service
    upstream wie_transaction_service {
        server localhost:5007 max_fails=3 fail_timeout=30s;
    }

    # Main server block
    server {
        listen 80;
        server_name localhost;

        # Increase buffer sizes
        client_max_body_size 10M;
        client_body_buffer_size 128k;
        large_client_header_buffers 4 16k;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        send_timeout 60s;

        # Compression
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

        # User Service Routes (Load Balanced)
        location /api/user {
            proxy_pass http://wie_user_service;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            proxy_buffering off;
        }

        location /api/tickets {
            proxy_pass http://wie_user_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Auth Service
        location /api/auth {
            proxy_pass http://wie_auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Ticket Service
        location /api/ticket {
            proxy_pass http://wie_ticket_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Chat Service
        location /api/chat {
            proxy_pass http://wie_chat_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # WebSocket for real-time chat
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Notification Service
        location /api/notification {
            proxy_pass http://wie_notification_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # SSE support for real-time notifications
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            chunked_transfer_encoding off;
        }

        # Transaction Service
        location /api/transaction {
            proxy_pass http://wie_transaction_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Health check endpoints
        location /health {
            proxy_pass http://wie_user_service;
            proxy_set_header Host $host;
            access_log off;
        }

        location /health/auth {
            proxy_pass http://wie_auth_service/health;
            access_log off;
        }

        location /health/ticket {
            proxy_pass http://wie_ticket_service/health;
            access_log off;
        }

        location /health/chat {
            proxy_pass http://wie_chat_service/health;
            access_log off;
        }

        location /health/notification {
            proxy_pass http://wie_notification_service/health;
            access_log off;
        }

        location /health/transaction {
            proxy_pass http://wie_transaction_service/health;
            access_log off;
        }

        # Load balancer status
        location /lb-status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            deny all;
        }

        # Frontend (Next.js)
        location / {
            proxy_pass http://localhost:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Error pages
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root html;
        }
    }
}